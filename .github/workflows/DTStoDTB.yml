name: Convert RK3568 DTS to DTB (6.1.76)
on:
  push:
    paths:
      - 'userpatches/lyt-t68m.dts'
      - 'userpatches/rk3568.dtsi'
  workflow_dispatch:

jobs:
  build-dtb:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. 一键安装DTC（官方源，稳定无路径问题）
      - name: Install DTC (device-tree-compiler)
        run: |
          sudo apt update && sudo apt install -y device-tree-compiler
          # 验证DTC是否安装成功
          dtc --version

      # 3. 转换DTS到DTB
      - name: Convert DTS to DTB
        run: |
          cd userpatches
          # 检查文件是否存在
          if [ ! -f "lyt-t68m.dts" ]; then
            echo "❌ ERROR: lyt-t68m.dts not found in userpatches!"
            exit 1
          fi
          if [ ! -f "rk3568.dtsi" ]; then
            echo "❌ ERROR: rk3568.dtsi not found in userpatches!"
            exit 1
          fi

          # 核心转换命令（直接用系统dtc，无路径问题）
          dtc -I dts -O dtb -o lyt-t68m.dtb \
            lyt-t68m.dts \
            -@ \                  # 启用符号表
            -H epapr \            # 适配RK3568
            -W no-unit_address_vs_reg  # 关闭无关警告

          # 验证DTB生成
          if [ -f "lyt-t68m.dtb" ]; then
            echo "✅ SUCCESS: lyt-t68m.dtb generated!"
            ls -lh lyt-t68m.dtb
          else
            echo "❌ FAILED: DTB file not generated!"
            exit 1
          fi

      # 4. 提交DTB到仓库
      - name: Commit DTB
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          cd ..
          git add userpatches/lyt-t68m.dtb
          
          # 仅当有变更时提交
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "Auto-generate lyt-t68m.dtb (6.1.76)"
            git push
          fi
