name: Convert RK3568 DTS to DTB (6.1.76)
on:
  push:
    paths:
      - 'userpatches/lyt-t68m.dts'
      - 'userpatches/rk3568.dtsi'
  workflow_dispatch:

jobs:
  build-dtb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y device-tree-compiler git

      - name: Download missing dt-bindings headers
        run: |
          # 创建dt-bindings目录
          mkdir -p userpatches/dt-bindings/{input,gpio,clock,power,reset}
          
          # 下载input/input.h
          curl -o userpatches/dt-bindings/input/input.h https://raw.githubusercontent.com/torvalds/linux/master/include/dt-bindings/input/input.h
          
          # 下载gpio/gpio.h
          curl -o userpatches/dt-bindings/gpio/gpio.h https://raw.githubusercontent.com/torvalds/linux/master/include/dt-bindings/gpio/gpio.h
          
          # 下载rk3568-cru.h
          curl -o userpatches/dt-bindings/clock/rk3568-cru.h https://raw.githubusercontent.com/rockchip-linux/kernel/6.1/include/dt-bindings/clock/rk3568-cru.h
          
          # 下载rk3568-power.h
          curl -o userpatches/dt-bindings/power/rk3568-power.h https://raw.githubusercontent.com/rockchip-linux/kernel/6.1/include/dt-bindings/power/rk3568-power.h
          
          # 下载rk3568-cru.h (reset)
          curl -o userpatches/dt-bindings/reset/rk3568-cru.h https://raw.githubusercontent.com/rockchip-linux/kernel/6.1/include/dt-bindings/reset/rk3568-cru.h
          
          # 列出下载的文件
          ls -l userpatches/dt-bindings/

      - name: Convert DTS to DTB
        run: |
          cd userpatches
          # 核心命令：-i 指定本地dt-bindings目录
          dtc \
            -I dts \
            -O dtb \
            -o lyt-t68m.dtb \
            -H epapr \
            -@ \
            -i ./ \  # 包含当前目录的dt-bindings
            lyt-t68m.dts
          
          # 验证结果
          if [ -f "lyt-t68m.dtb" ]; then
            echo "✅ DTB generated successfully!"
            ls -lh lyt-t68m.dtb
          else
            echo "❌ DTB generation failed!"
            exit 1
          fi

      - name: Commit DTB to repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          cd ..
          if [ -f "userpatches/lyt-t68m.dtb" ]; then
            git add userpatches/lyt-t68m.dtb
            if ! git diff --cached --quiet; then
              git commit -m "Auto-generate lyt-t68m.dtb (6.1.76)"
              git push
            fi
          fi
