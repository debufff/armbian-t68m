name: Convert RK3568 DTS to DTB (6.1.76)
on:
  push:
    paths:
      - 'userpatches/lyt-t68m.dts'       # 监听你新命名的DTS
      - 'userpatches/rk3568.dtsi'       # 监听芯片级DTSI
  workflow_dispatch:  # 允许手动触发

jobs:
  build-dtb:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装编译依赖
      - name: Install build dependencies
        run: |
          sudo apt update && sudo apt install -y \
            git make gcc flex bison

      # 3. 升级DTC到1.7.0+（适配6.1内核）
      - name: Upgrade DTC to v1.7.0+
        run: |
          sudo apt remove -y device-tree-compiler || true
          git clone https://git.kernel.org/pub/scm/utils/dtc/dtc.git
          cd dtc
          make
          sudo make install
          dtc --version

      # 4. 进入userpatches目录执行转换
      - name: Convert DTS to DTB
        run: |
          cd userpatches
          # 检查关键文件是否存在
          if [ ! -f "lyt-t68m.dts" ]; then
            echo "❌ Missing lyt-t68m.dts in userpatches!"
            exit 1
          fi
          if [ ! -f "rk3568.dtsi" ]; then
            echo "❌ Missing rk3568.dtsi in userpatches!"
            exit 1
          fi
          
          # 核心转换命令（适配6.1.76内核参数）
          dtc -I dts -O dtb -o lyt-t68m.dtb \
            lyt-t68m.dts \
            -@ \
            -H epapr \
            -W no-unit_address_vs_reg \
            -W no-avoid_unnecessary_addr_size \
            -W no-unique_unit_address
          
          # 验证DTB生成
          if [ -f "lyt-t68m.dtb" ]; then
            echo "✅ DTB file generated successfully!"
            ls -l lyt-t68m.dtb
          else
            echo "❌ Failed to generate DTB file!"
            exit 1
          fi

      # 5. 提交DTB文件到仓库
      - name: Commit DTB to repository
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          cd ..
          if ls userpatches/lyt-t68m.dtb 1> /dev/null 2>&1; then
            git add userpatches/lyt-t68m.dtb
          else
            echo "ℹ️ No DTB file to commit"
            exit 0
          fi
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "Auto-generate DTB for LYT T68m (6.1.76)"
            git push
          fi
