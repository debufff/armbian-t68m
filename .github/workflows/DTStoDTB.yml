name: Convert RK3568 DTS to DTB (6.1.76)
on:
  push:
    paths:
      - 'userpatches/lyt-t68m.dts'
      - 'userpatches/rk3568.dtsi'
  workflow_dispatch:

jobs:
  build-dtb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update && sudo apt install -y git make gcc flex bison

      # 修复：安装 DTC 并确保 PATH 包含 /usr/local/bin
      - name: Install DTC v1.7.0+
        run: |
          sudo apt remove -y device-tree-compiler || true
          git clone https://git.kernel.org/pub/scm/utils/dtc/dtc.git
          cd dtc
          make
          sudo make install
          # 强制将 /usr/local/bin 加入 PATH
          echo "PATH=/usr/local/bin:$PATH" >> $GITHUB_ENV
          # 验证安装
          source $GITHUB_ENV
          dtc --version

      - name: Convert DTS to DTB
        run: |
          cd userpatches
          if [ ! -f "lyt-t68m.dts" ]; then
            echo "❌ Missing lyt-t68m.dts in userpatches!"
            exit 1
          fi
          if [ ! -f "rk3568.dtsi" ]; then
            echo "❌ Missing rk3568.dtsi in userpatches!"
            exit 1
          fi
          
          # 直接调用 /usr/local/bin/dtc 确保可执行
          /usr/local/bin/dtc -I dts -O dtb -o lyt-t68m.dtb \
            lyt-t68m.dts \
            -@ \
            -H epapr \
            -W no-unit_address_vs_reg \
            -W no-avoid_unnecessary_addr_size \
            -W no-unique_unit_address
          
          if [ -f "lyt-t68m.dtb" ]; then
            echo "✅ DTB file generated successfully!"
            ls -l lyt-t68m.dtb
          else
            echo "❌ Failed to generate DTB file!"
            exit 1
          fi

      - name: Commit DTB to repository
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          cd ..
          if ls userpatches/lyt-t68m.dtb 1> /dev/null 2>&1; then
            git add userpatches/lyt-t68m.dtb
          else
            echo "ℹ️ No DTB file to commit"
            exit 0
          fi
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "Auto-generate DTB for LYT T68m (6.1.76)"
            git push
          fi
