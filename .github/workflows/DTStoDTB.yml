name: Convert RK3568 DTS to DTB (6.1.76)
on:
  push:
    paths:
      - 'userpatches/lyt-t68m.dts'
      - 'userpatches/rk3568.dtsi'
  workflow_dispatch:

jobs:
  build-dtb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install DTC (only)
        run: |
          sudo apt update && sudo apt install -y device-tree-compiler
          dtc --version

      - name: Patch DTS to remove header dependencies
        run: |
          # 关键：临时修改DTS，删除所有dt-bindings引用（仅保留rk3568.dtsi）
          cd userpatches
          # 备份原DTS
          cp lyt-t68m.dts lyt-t68m.dts.bak
          # 删除所有<dt-bindings/...>引用行
          sed -i '/#include <dt-bindings\//d' lyt-t68m.dts
          # 手动定义缺失的宏（避免语法错误）
          cat >> lyt-t68m.dts << EOF
          #define GPIO_ACTIVE_LOW 0
          #define GPIO_ACTIVE_HIGH 1
          #define IRQ_TYPE_LEVEL_HIGH 4
          #define IRQ_TYPE_LEVEL_LOW 8
          #define GIC_SPI 0
          #define RK3568_PD_NPU 0
          #define RK3568_PD_PCIE 0
          #define RK3568_PD_CPU0 0
          #define CLK_NPU 0
          #define HCLK_NPU 0
          EOF
          # 查看修改后的DTS（日志可查）
          cat lyt-t68m.dts | head -30

      - name: Convert DTS to DTB (no dependencies)
        run: |
          cd userpatches
          # 核心转换：仅依赖本地rk3568.dtsi，无外部头文件
          dtc \
            -I dts \
            -O dtb \
            -o lyt-t68m.dtb \
            -H epapr \
            -@ \
            -f \  # 强制忽略非致命错误（如未定义的宏）
            lyt-t68m.dts

          # 验证结果
          if [ -f "lyt-t68m.dtb" ]; then
            echo "✅ DTB generated successfully!"
            ls -lh lyt-t68m.dtb
            # 恢复原DTS（不影响仓库）
            mv lyt-t68m.dts.bak lyt-t68m.dts
          else
            echo "❌ DTB generation failed!"
            exit 1
          fi

      - name: Commit DTB to repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          cd ..
          if [ -f "userpatches/lyt-t68m.dtb" ]; then
            git add userpatches/lyt-t68m.dtb
            if ! git diff --cached --quiet; then
              git commit -m "Auto-generate lyt-t68m.dtb (6.1.76)"
              git push
            fi
          fi
