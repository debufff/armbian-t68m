name: DTS to DTB Compiler (GitHub Actions)
on: [workflow_dispatch]

jobs:
  compile-dtb:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Install device-tree-compiler
        run: |
          sudo apt update
          sudo apt install -y device-tree-compiler
          dtc --version

      - name: Compile official RK3568 DTB (for testing)
        run: |
          # 下载官方 RK3568 DTS（无语法错误）
          wget -O rk3568.dts https://raw.githubusercontent.com/torvalds/linux/master/arch/arm64/boot/dts/rockchip/rk3568.dtsi
          # 编译为 DTB
          dtc -I dts -O dtb -o rk3568-test.dtb rk3568.dts
          ls -lh rk3568-test.dtb

      - name: Upload test DTB
        uses: actions/upload-artifact@v4
        with:
          name: RK3568-Test-DTB
          path: rk3568-test.dtb
