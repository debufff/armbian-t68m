name: Build Armbian for LYT-T68M (Light LXQt + Browser Only)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare build environment (适配官方编译依赖)
        run: |
          sudo apt update && sudo apt upgrade -y
          # 安装Armbian官方编译必需依赖（精简且兼容）
          sudo apt install -y \
            git make gcc gcc-aarch64-linux-gnu device-tree-compiler \
            bc flex bison qemu-user-static binfmt-support \
            libssl-dev python3-distutils unzip

      - name: Clone Armbian official repo (确保最新版)
        run: |
          git clone --depth=1 https://github.com/armbian/build.git armbian-build
          # 验证官方脚本版本
          cd armbian-build && ./compile.sh --version

      - name: Copy custom configs (确保路径/权限正确)
        run: |
          # 先清空旧配置（避免冲突）
          rm -rf armbian-build/config/boards/lyt-t68m.conf
          rm -rf armbian-build/config/kernel/linux-rk35xx-current.config
          # 创建目录+复制配置（避免权限问题）
          mkdir -p armbian-build/config/boards/ armbian-build/config/kernel/ armbian-build/userpatches/
          cp -f config/boards/lyt-t68m.conf armbian-build/config/boards/
          cp -f config/kernel/linux-rk35xx-current.config armbian-build/config/kernel/
          cp -rf userpatches/* armbian-build/userpatches/
          # 验证配置文件
          ls -lh armbian-build/config/boards/lyt-t68m.conf
          ls -lh armbian-build/config/kernel/linux-rk35xx-current.config

      - name: Build image (适配官方参数规范 + 无交互)
        run: |
          cd armbian-build
          # 核心：清空干扰环境变量 + 官方参数规范
          export SKIP_BINFMT_SETUP=1
          unset COLUMNS LINES  # 解决终端宽度解析干扰
          # 按官方顺序排列参数：核心→编译→交互→桌面→软件
          ./compile.sh \
            BOARD=lyt-t68m \                # 核心：板型（必选，放最前）
            BRANCH=current \                # 核心：内核分支（替换 KERNEL_TARGET）
            RELEASE=jammy \                 # 核心：系统版本
            ARCH=arm64 \                    # 核心：架构
            CLEAN_LEVEL=full \              # 编译参数：全量清理缓存
            LINUXCONFIG=linux-rk35xx-current.config \ # 编译参数：内核配置
            KERNEL_CONFIGURE=no \           # 交互参数：禁用内核配置弹窗
            EXPERT=1 \                      # 交互参数：专家模式，跳过非必要交互
            BUILD_DESKTOP=yes \             # 桌面参数：启用桌面
            DESKTOP_ENVIRONMENT=lxqt \      # 桌面参数：轻量LXQt（无交互选择）
            DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \ # 桌面参数：基础配置
            DESKTOP_APPGROUPS_SELECTED=browser \          # 软件参数：仅浏览器组
            EXTRA_PACKAGES=firefox-esr \                  # 软件参数：指定Firefox ESR
            REMOVE_PACKAGES='libreoffice* thunderbird* vlc*' # 软件参数：移除多余软件（单引号避免通配符解析）

      - name: Extract standalone DTB file (确保独立DTB生成)
        run: |
          # 兼容查找内核源码目录（适配不同Armbian版本）
          KERNEL_DIR=$(find armbian-build/output/build/ -name "linux-*-rk35xx" -type d | head -1)
          if [ -n "$KERNEL_DIR" ]; then
              cd $KERNEL_DIR
              # 强制编译DTB（适配官方自动生成逻辑）
              make ARCH=arm64 rockchip_linux_defconfig
              make ARCH=arm64 arch/arm64/boot/dts/rockchip/rk3568-lyt-t68m.dtb
              # 复制到产物目录
              cp arch/arm64/boot/dts/rockchip/rk3568-lyt-t68m.dtb ../../../../output/images/
              echo "✅ Standalone DTB file generated: rk3568-lyt-t68m.dtb"
          else
              echo "⚠️ Kernel directory not found, skip DTB extraction"
          fi

      - name: Upload all artifacts (包含镜像+DTB)
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-T68M-LXQt-Browser
          path: armbian-build/output/images/
          retention-days: 7
