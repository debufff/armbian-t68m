name: Compile T68M (8GB Disk + Xfce)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - name: Checkout your T68M config
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Armbian source
        run: |
          git clone --depth=1 https://github.com/armbian/build.git armbian-build
          sudo chown -R $USER:$USER armbian-build

      - name: Overwrite T68M config
        run: |
          mkdir -p armbian-build/config/boards/ armbian-build/config/kernel/
          cp -f config/boards/lyt-t68m.conf armbian-build/config/boards/ || true
          cp -f config/kernel/linux-rk35xx-legacy.config armbian-build/config/kernel/ || true

      - name: Fix patching.py bug
        run: |
          sed -i 's/console_width = int(os.environ.get("COLUMNS", 160)) - 12/console_width = int(os.environ.get("COLUMNS", "160")) - 12/' armbian-build/lib/tools/patching.py

      - name: Install basic dependencies
        run: |
          sudo apt update
          sudo apt install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-aarch64

      - name: Compile T68M with Xfce desktop
        run: |
          cd armbian-build
          export SKIP_BINFMT_SETUP=1
          ./compile.sh \
              BOARD=lyt-t68m \
              BRANCH=current \
              RELEASE=jammy \
              BUILD_MINIMAL=no \
              BUILD_DESKTOP=yes \
              # 核心修改：替换为Xfce桌面
              DESKTOP_ENVIRONMENT=xfce \
              DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
              DESKTOP_APPGROUPS_SELECTED="" \
              EXPERT=1 \
              KERNEL_CONFIGURE=no \
              FAMILY=rockchip-rk3568 \
              KERNELVERSION=6.1.12-current \
              ARCH=arm64

      - name: List output files (verify DTB exists)
        run: |
          # 列出编译产物，确认DTB文件存在
          ls -lh armbian-build/output/images/
          # 显式检查DTB文件（RK3568的DTB通常在镜像目录或boot分区内）
          ls -lh armbian-build/output/images/*.dtb || echo "DTB文件已包含在镜像/boot目录中"

      - name: Upload artifacts (include DTB)
        uses: actions/upload-artifact@v4
        with:
          name: T68M-Xfce-rockchip64-6.12
          # 上传所有编译产物（含镜像、DTB、内核、脚本等）
          path: |
            armbian-build/output/images/*
            # 显式指定DTB文件（确保不遗漏）
            armbian-build/output/images/*.dtb
          retention-days: 7
