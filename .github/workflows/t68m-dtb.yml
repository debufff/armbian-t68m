name: Build Armbian for LYT-T68M (Light LXQt + Browser Only)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y git make gcc-aarch64-linux-gnu device-tree-compiler bc flex bison qemu-user-static binfmt-support

      - name: Clone Armbian build repo
        run: |
          git clone --depth=1 https://github.com/armbian/build.git armbian-build

      - name: Copy custom configs
        run: |
          mkdir -p armbian-build/config/boards/ armbian-build/config/kernel/ armbian-build/userpatches/
          cp -f config/boards/lyt-t68m.conf armbian-build/config/boards/
          cp -f config/kernel/linux-rk35xx-current.config armbian-build/config/kernel/
          cp -rf userpatches/* armbian-build/userpatches/

      - name: Build image (No Interactive - Fixed Params)
        run: |
          cd armbian-build
          export SKIP_BINFMT_SETUP=1
          ./compile.sh \
            BOARD=lyt-t68m \
            KERNEL_TARGET=current \
            CLEAN_LEVEL=full \
            BUILD_DTB=yes \
            LINUXCONFIG=linux-rk35xx-current.config \
            KERNEL_CONFIGURE=no \
            EXPERT=1 \
            BUILD_DESKTOP=yes \
            DESKTOP_ENVIRONMENT=lxqt \
            DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
            DESKTOP_APPGROUPS_SELECTED=browser \
            EXTRA_PACKAGES=firefox-esr \
            REMOVE_PACKAGES="libreoffice* thunderbird* vlc*" \
            ARCH=arm64 \
            RELEASE=jammy

      - name: Extract DTB
        run: |
          KERNEL_DIR=$(find armbian-build/output/build/ -name "linux-*-rk35xx" -type d)
          if [ -n "$KERNEL_DIR" ]; then
            cd $KERNEL_DIR
            make ARCH=arm64 rockchip_linux_defconfig
            make ARCH=arm64 arch/arm64/boot/dts/rockchip/rk3568-lyt-t68m.dtb
            cp arch/arm64/boot/dts/rockchip/rk3568-lyt-t68m.dtb ../../../../output/images/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-T68M-LXQt-Browser
          path: armbian-build/output/images/
          retention-days: 7
