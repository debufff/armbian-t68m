# .github/workflows/dts2dtb.yml
name: Compile T68M DTS to DTB (Correct)
on: [workflow_dispatch]

jobs:
  build-dtb:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y device-tree-compiler

      - name: Download Rockchip RK3568 DTS sources (fix missing includes)
        run: |
          # 创建存放官方 dts 和 dt-bindings 的目录
          mkdir -p rk-dts
          cd rk-dts

          # 下载官方 RK3568 内核树（包含所有 dtsi / dt-bindings）
          # 这是解决 #include "rk3568.dtsi" 与 <dt-bindings/xxx.h> 缺失的关键
          wget https://github.com/rockchip-linux/kernel/archive/refs/heads/develop-5.10.zip -O kernel.zip
          unzip -q kernel.zip
          mv kernel-develop-5.10 linux

          # 软链接你的 DTS 到官方目录（方便编译）
          cd ..
          ln -s $(pwd)/userpatches/board-dts/rk3568-lyt-t68m.dts rk-dts/linux/arch/arm64/boot/dts/rockchip/

      - name: Compile DTS with full includes
        run: |
          DTS_FILE="userpatches/board-dts/rk3568-lyt-t68m.dts"
          DTB_FILE="${DTS_FILE%.dts}.dtb"
          RK_DTS_DIR="rk-dts/linux/arch/arm64/boot/dts/rockchip"
          DT_BINDINGS_DIR="rk-dts/linux/include/dt-bindings"

          echo "📂 Using RK3568 official includes from: $RK_DTS_DIR"
          
          # 核心编译命令：指定 -i 搜索路径，彻底解决 "文件缺失"
          # -i 指向官方 dtsi 目录
          # -i 指向官方 dt-bindings 目录
          cd rk-dts/linux/arch/arm64/boot/dts/rockchip/
          dtc -I dts -O dtb -o "../../../../../../$DTB_FILE" \
              -i "$RK_DTS_DIR" \
              -i "$DT_BINDINGS_DIR" \
              "$(basename $DTS_FILE)"

          # 验证结果
          if [ -f "$DTB_FILE" ]; then
            echo "✅ 编译成功！文件路径: $(pwd)/../../../../../../$DTB_FILE"
            ls -lh ../../../../../../userpatches/board-dts/*.dtb
          else
            echo "❌ 编译失败！"
            exit 1
          fi

      - name: Upload DTB artifact
        uses: actions/upload-artifact@v4
        with:
          name: T68M-DTB
          path: |
            userpatches/board-dts/rk3568-lyt-t68m.dtb
            userpatches/board-dts/rk3568-lyt-t68m.dts
