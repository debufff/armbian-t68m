# .github/workflows/dts2dtb.yml
name: DTS to DTB Compiler (T68M)
on: [workflow_dispatch]  # 手动触发编译

jobs:
  compile-dtb:
    runs-on: ubuntu-22.04
    steps:
      # 步骤1：拉取仓库代码（包含你修改后的DTS文件）
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步骤2：安装设备树编译器（dtc）
      - name: Install device-tree-compiler
        run: |
          sudo apt update
          sudo apt install -y device-tree-compiler
          # 验证安装
          dtc --version
          echo "✅ DTC 编译器安装完成"

      # 步骤3：编译DTS为DTB（核心步骤）
      - name: Compile T68M DTS to DTB
        run: |
          # 配置你的DTS文件路径（无需修改，匹配你的仓库结构）
          DTS_FILE="userpatches/board-dts/rk3568-lyt-t68m.dts"
          # 自动生成DTB文件名（替换后缀）
          DTB_FILE="${DTS_FILE%.dts}.dtb"

          # 检查DTS文件是否存在
          if [ ! -f "$DTS_FILE" ]; then
            echo "❌ 错误：DTS文件不存在 → $DTS_FILE"
            exit 1
          fi

          # 编译命令（包含rockchip官方头文件依赖）
          echo "📝 开始编译：$DTS_FILE → $DTB_FILE"
          dtc -I dts -O dtb -o "$DTB_FILE" \
              -i /usr/src/linux-headers-$(uname -r)/arch/arm64/boot/dts/rockchip/ \
              -i /usr/src/linux-headers-$(uname -r)/include/dt-bindings/ \
              "$DTS_FILE"

          # 验证编译结果
          if [ -f "$DTB_FILE" ]; then
            echo "✅ 编译成功！DTB文件路径：$(pwd)/$DTB_FILE"
            ls -lh "$DTB_FILE"  # 显示文件大小
          else
            echo "❌ 编译失败！请检查DTS语法"
            exit 1
          fi

      # 步骤4：上传编译好的DTB文件（供下载）
      - name: Upload T68M DTB
        uses: actions/upload-artifact@v4
        with:
          name: T68M-DTB
          path: |
            userpatches/board-dts/rk3568-lyt-t68m.dtb
            userpatches/board-dts/rk3568-lyt-t68m.dts  # 同时上传源文件，方便对比
