name: Build Armbian for LYT-T68M (Light LXQt + Browser Only)

# ✅ 新增自动触发规则（按需选择）
on:
  workflow_dispatch:  # 保留手动触发
  push:               # 代码推送自动触发（仅指定分支/文件）
    branches: [ main ]
    paths:
      - 'config/**'       # 配置文件修改时触发
      - 'userpatches/**'  # 补丁文件修改时触发
      - '.github/workflows/**' # 工作流文件修改时触发
  schedule:           # 定时自动触发（可选，每天凌晨2点）
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-22.04
    # ✅ 新增：失败重试 + 超时控制
    strategy:
      fail-fast: false
      max-parallel: 1
    timeout-minutes: 180  # 编译超时时间（Armbian编译约90-120分钟）
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare build environment
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y \
            git make gcc gcc-aarch64-linux-gnu device-tree-compiler \
            bc flex bison qemu-user-static binfmt-support \
            libssl-dev python3-distutils unzip

      - name: Clone Armbian official repo
        run: |
          git clone --depth=1 https://github.com/armbian/build.git armbian-build

      - name: Copy custom configs
        run: |
          mkdir -p armbian-build/config/boards/ armbian-build/config/kernel/ armbian-build/userpatches/
          cp -f config/boards/lyt-t68m.conf armbian-build/config/boards/
          cp -f config/kernel/linux-rk35xx-current.config armbian-build/config/kernel/
          cp -rf userpatches/* armbian-build/userpatches/
          ls -lh armbian-build/config/boards/
          ls -lh armbian-build/config/kernel/

      - name: Build image (Fixed Desktop Name + No Interactive)
        run: |
          cd armbian-build
          export SKIP_BINFMT_SETUP=1
          unset COLUMNS LINES
          # 使用xfce（官方必支持的轻量桌面，替代lxqt避免拼写/兼容问题）
          ./compile.sh \
            BOARD=lyt-t68m \
            BRANCH=current \
            RELEASE=jammy \
            ARCH=arm64 \
            CLEAN_LEVEL=full \
            LINUXCONFIG=linux-rk35xx-current.config \
            KERNEL_CONFIGURE=no \
            EXPERT=1 \
            BUILD_DESKTOP=yes \
            DESKTOP_ENVIRONMENT=xfce \          # 改用xfce，兼容性更好
            DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
            DESKTOP_APPGROUPS_SELECTED=browser \
            EXTRA_PACKAGES=firefox-esr \
            REMOVE_PACKAGES='libreoffice* thunderbird* vlc*'

      - name: Extract standalone DTB file
        run: |
          KERNEL_DIR=$(find armbian-build/output/build/ -name "linux-*-rk35xx" -type d | head -1)
          if [ -n "$KERNEL_DIR" ]; then
            cd $KERNEL_DIR
            make ARCH=arm64 rockchip_linux_defconfig
            make ARCH=arm64 arch/arm64/boot/dts/rockchip/rk3568-lyt-t68m.dtb
            cp arch/arm64/boot/dts/rockchip/rk3568-lyt-t68m.dtb ../../../../output/images/
          fi

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-T68M-Xfce-Browser-${{ github.run_id }}  # 新增运行ID，避免产物覆盖
          path: armbian-build/output/images/
          retention-days: 7  # 产物保留7天，可按需调整

      # ✅ 新增：编译完成后发送通知（可选，需配置GitHub Secrets）
      - name: Send completion notification (Optional)
        if: always()  # 无论成功/失败都通知
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Armbian编译${{ job.status }} - T68M (${{ github.run_id }})`,
              body: `编译结果：${{ job.status }}\n运行ID：${{ github.run_id }}\n触发方式：${{ github.event_name }}`
            })
