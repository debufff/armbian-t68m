- name: Compile DTS to DTB
  run: |
    DTS_FILE="userpatches/board-dts/rk3568-lyt-t68m.dts"
    # 新增官方rockchip DTSI头文件依赖目录（关键！）
    INCLUDE_DIR="/usr/src/linux-headers-$(uname -r)/arch/arm64/boot/dts/rockchip/"
    
    if [ ! -f "$DTS_FILE" ]; then
      echo "❌ 错误：DTS 文件不存在 → $DTS_FILE"
      exit 1
    fi
    
    DTB_FILE="${DTS_FILE%.dts}.dtb"
    echo "📝 开始编译：$DTS_FILE → $DTB_FILE"
    # 带依赖目录编译，解决#include "rk3568.dtsi"引用
    dtc -I dts -O dtb -o "$DTB_FILE" -i "$INCLUDE_DIR" "$DTS_FILE"
    
    if [ -f "$DTB_FILE" ]; then
      echo "✅ 编译成功！DTB 文件路径：$DTB_FILE"
      ls -lh "$DTB_FILE"
    else
      echo "❌ 编译失败！"
      exit 1
    fi
