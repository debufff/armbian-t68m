name: Compile T68M (rockchip64-6.12)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout your T68M config
        uses: actions/checkout@v4

      - name: Download Armbian official source
        run: |
          wget -O armbian-build.zip https://github.com/armbian/build/archive/refs/heads/main.zip
          unzip -q armbian-build.zip
          mv build-main armbian-build
          sudo chown -R $USER:$USER armbian-build

      - name: Overwrite all T68M config
        run: |
          cp -f config/boards/lyt-t68m.conf armbian-build/config/boards/
          cp -f config/kernel/linux-rk35xx-legacy.config armbian-build/config/kernel/
          mkdir -p armbian-build/userpatches/
          cp -rf userpatches/* armbian-build/userpatches/

      # ✅ 仅安装必要依赖（适配ARM64编译）
      - name: Install minimal dependencies (only ARM64 needed)
        run: |
          sudo apt update
          sudo apt install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-aarch64

      # ✅ 修复patching.py控制台宽度bug
      - name: Fix patching.py console_width bug
        run: |
          sed -i 's/console_width = int(os.environ.get("COLUMNS", 160)) - 12/console_width = int(os.environ.get("COLUMNS", "160")) - 12/' armbian-build/lib/tools/patching.py

      # ✅ 编译（核心：用你的方式跳过交互 + 轻量LXQt + 仅浏览器）
      - name: Compile T68M image (Light LXQt + Browser Only)
        run: |
          cd armbian-build
          export SKIP_BINFMT_SETUP=1
          ./compile.sh \
              BOARD=lyt-t68m \
              BRANCH=current \
              RELEASE=jammy \
              BUILD_MINIMAL=no \
              BUILD_DESKTOP=yes \
              DESKTOP_ENVIRONMENT=lxqt \          # 性能最小的LXQt桌面
              DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \  # 基础配置，无多余软件
              DESKTOP_APPGROUPS_SELECTED="browser" \         # 仅预装浏览器组
              EXTRA_PACKAGES="firefox-esr" \                 # 指定轻量Firefox ESR
              REMOVE_PACKAGES="libreoffice* thunderbird* vlc*" \ # 移除耗资源软件
              EXPERT=1 \                              # 专家模式，减少交互
              KERNEL_CONFIGURE=no \                   # 核心：禁用内核配置交互
              FAMILY=rockchip-rk3568 \
              KERNELVERSION=6.1.12-current \
              ARCH=arm64

      # ✅ 提取独立DTB + 上传所有产物
      - name: Extract standalone DTB file
        run: |
          # 找到内核源码目录
          KERNEL_DIR=$(find armbian-build/output/build/ -name "linux-*-rk35xx" -type d)
          if [ -n "$KERNEL_DIR" ]; then
              cd $KERNEL_DIR
              # 手动编译DTB（确保生成）
              make ARCH=arm64 rockchip_linux_defconfig
              make ARCH=arm64 arch/arm64/boot/dts/rockchip/rk3568-lyt-t68m.dtb
              # 复制到产物目录
              cp arch/arm64/boot/dts/rockchip/rk3568-lyt-t68m.dtb ../../../../output/images/
              echo "✅ Standalone DTB file generated"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: T68M-rockchip64-6.12-image (LXQt + Firefox)
          path: armbian-build/output/images/
          retention-days: 7
