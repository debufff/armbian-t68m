name: Compile T68M (Xfce - Valid Kernel Config)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout your T68M config
        uses: actions/checkout@v4

      - name: Download Armbian official source
        run: |
          wget -O armbian-build.zip https://github.com/armbian/build/archive/refs/heads/main.zip
          unzip -q armbian-build.zip
          mv build-main armbian-build
          sudo chown -R $USER:$USER armbian-build

      - name: Overwrite config (Use Official RK3568 Kernel Config)
        run: |
          cp -f config/boards/lyt-t68m.conf armbian-build/config/boards/
          cp -f config/kernel/linux-rockchip64-current.config armbian-build/config/kernel/linux-rockchip64-current.config
          mkdir -p armbian-build/userpatches/
          cp -rf userpatches/* armbian-build/userpatches/

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-aarch64

      - name: Fix patching.py bug
        run: |
          sed -i 's/console_width = int(os.environ.get("COLUMNS", 160)) - 12/console_width = int(os.environ.get("COLUMNS", "160")) - 12/' armbian-build/lib/tools/patching.py

      - name: Compile T68M Image (No Kernel Config Error)
        run: |
          cd armbian-build
          export SKIP_BINFMT_SETUP=1
          unset COLUMNS LINES
          # 不再手动传递 LINUXCONFIG，由配置文件自动识别
          ./compile.sh \
              BOARD=lyt-t68m \
              BRANCH=current \
              RELEASE=jammy \
              BUILD_MINIMAL=no \
              BUILD_DESKTOP=yes \
              DESKTOP_ENVIRONMENT=xfce \
              DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
              EXPERT=1 \
              KERNEL_CONFIGURE=no \
              ARCH=arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: T68M-rockchip64-Xfce
          path: armbian-build/output/images/
