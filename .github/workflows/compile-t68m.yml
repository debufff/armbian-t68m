name: Compile T68M (rockchip64-6.12)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout your T68M config
        uses: actions/checkout@v4

      - name: Download Armbian official source
        run: |
          wget -O armbian-build.zip https://github.com/armbian/build/archive/refs/heads/main.zip
          unzip -q armbian-build.zip
          mv build-main armbian-build
          sudo chown -R $USER:$USER armbian-build

      - name: Overwrite all T68M config
        run: |
          cp -f config/boards/lyt-t68m.conf armbian-build/config/boards/
          # 修正内核配置文件名（匹配你仓库实际文件）
          cp -f config/kernel/linux-rk35xx-current.config armbian-build/config/kernel/
          mkdir -p armbian-build/userpatches/
          cp -rf userpatches/* armbian-build/userpatches/

      - name: Install minimal dependencies (only ARM64 needed)
        run: |
          sudo apt update
          sudo apt install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-aarch64

      - name: Fix patching.py console_width bug
        run: |
          sed -i 's/console_width = int(os.environ.get("COLUMNS", 160)) - 12/console_width = int(os.environ.get("COLUMNS", "160")) - 12/' armbian-build/lib/tools/patching.py

      - name: Compile T68M image (No Desktop Environment)
        run: |
          cd armbian-build
          export SKIP_BINFMT_SETUP=1
          ./compile.sh \
              BOARD=lyt-t68m \
              BRANCH=current \
              RELEASE=jammy \
              BUILD_MINIMAL=yes \          # 启用最小化系统（无桌面）
              BUILD_DESKTOP=no \           # 彻底关闭桌面编译
              EXPERT=1 \
              KERNEL_CONFIGURE=no \
              FAMILY=rockchip-rk3568 \
              KERNELVERSION=6.1.12-current \
              ARCH=arm64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: T68M-rockchip64-6.12-image (No Desktop)
          path: armbian-build/output/images/
