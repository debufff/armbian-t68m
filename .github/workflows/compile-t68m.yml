name: Compile T68M (Xfce - FINAL - COPY KERNEL CONFIG FIRST)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout your config
        uses: actions/checkout@v4

      - name: Clone Armbian Build
        run: |
          git clone --depth=1 https://github.com/armbian/build.git armbian-build
          sudo chown -R $USER:$USER armbian-build

      - name: APPLY YOUR CONFIG (COPY KERNEL CONFIG FIRST - CRITICAL)
        run: |
          # 1. 复制你的板型配置
          cp -f config/boards/lyt-t68m.conf armbian-build/config/boards/
          # 2. 关键：先复制内核配置文件到 armbian-build/config/kernel/ 目录下
          #    确保 config_source_board_file() 阶段就能找到文件
          cp -f config/kernel/linux-rk35xx-vendor.config armbian-build/config/kernel/
          # 3. 复制用户补丁
          mkdir -p armbian-build/userpatches/
          cp -rf userpatches/* armbian-build/userpatches/

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-aarch64

      - name: Fix patching.py bug
        run: |
          sed -i 's/console_width = int(os.environ.get("COLUMNS", 160)) - 12/console_width = int(os.environ.get("COLUMNS", "160")) - 12/' armbian-build/lib/tools/patching.py

      - name: Compile T68M Image (FINAL - NO ERRORS)
        run: |
          cd armbian-build
          export SKIP_BINFMT_SETUP=1
          unset COLUMNS LINES
          ./compile.sh \
              BOARD=lyt-t68m \
              BRANCH=vendor \
              RELEASE=jammy \
              BUILD_MINIMAL=no \
              BUILD_DESKTOP=yes \
              DESKTOP_ENVIRONMENT=xfce \
              DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
              EXPERT=1 \
              KERNEL_CONFIGURE=no \
              ARCH=arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: T68M-rockchip64-Xfce
          path: armbian-build/output/images/
