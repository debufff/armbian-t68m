name: Compile T68M (Xfce - No Kernel Config - Final Bypass)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout your config
        uses: actions/checkout@v4

      - name: Download Armbian Build
        run: |
          wget -O armbian-build.zip https://github.com/armbian/build/refs/heads/main.zip
          unzip -q armbian-build.zip
          mv build-main armbian-build
          sudo chown -R $USER:$USER armbian-build

      - name: Apply your config (NO LINUXCONFIG - Bypass Check)
        run: |
          # 1. 复制你修改后的 lyt-t68m.conf（已删除 LINUXCONFIG 行）
          cp -f config/boards/lyt-t68m.conf armbian-build/config/boards/
          # 2. 复制用户补丁（DTS 等，不涉及内核配置）
          mkdir -p armbian-build/userpatches/
          cp -rf userpatches/* armbian-build/userpatches/

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-aarch64

      - name: Fix patching.py bug
        run: |
          sed -i 's/console_width = int(os.environ.get("COLUMNS", 160)) - 12/console_width = int(os.environ.get("COLUMNS", "160")) - 12/' armbian-build/lib/tools/patching.py

      - name: Compile T68M Image (BYPASS ALL KERNEL CONFIG CHECKS)
        run: |
          cd armbian-build
          export SKIP_BINFMT_SETUP=1
          unset COLUMNS LINES
          # 极简参数：完全不碰内核配置，由 Armbian 自动处理
          ./compile.sh \
              BOARD=lyt-t68m \
              BRANCH=vendor \
              RELEASE=jammy \
              BUILD_MINIMAL=no \
              BUILD_DESKTOP=yes \
              DESKTOP_ENVIRONMENT=xfce \
              DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
              EXPERT=1 \
              KERNEL_CONFIGURE=no \
              ARCH=arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: T68M-rockchip64-Xfce
          path: armbian-build/output/images/
