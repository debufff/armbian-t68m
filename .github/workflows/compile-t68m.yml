name: Compile T68M (rockchip64-6.12)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout your T68M config
        uses: actions/checkout@v4

      - name: Download Armbian official source
        run: |
          wget -O armbian-build.zip https://github.com/armbian/build/archive/refs/heads/main.zip
          unzip -q armbian-build.zip
          mv build-main armbian-build

      - name: Overwrite all T68M config
        run: |
          cp -f config/boards/lyt-t68m.conf armbian-build/config/boards/
          cp -f config/kernel/linux-rk35xx-legacy.config armbian-build/config/kernel/
          mkdir -p armbian-build/userpatches/
          cp -rf userpatches/* armbian-build/userpatches/

      - name: Install dependencies
        run: |
          cd armbian-build
          sudo apt update
          sudo apt install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-aarch64

      # ✅ 关键修复：添加 EXPERT=1 和 DESKTOP_APPGROUPS_SELECTED="" 彻底跳过所有交互
      - name: Compile T68M image
        run: |
          cd armbian-build
          sudo ./compile.sh \
              BOARD=lyt-t68m \
              BRANCH=current \
              RELEASE=jammy \
              BUILD_MINIMAL=no \
              BUILD_DESKTOP=yes \
              DESKTOP_ENVIRONMENT=gnome \
              DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
              DESKTOP_APPGROUPS_SELECTED="" \
              EXPERT=1 \
              KERNEL_CONFIGURE=no \
              FAMILY=rockchip-rk3568 \
              KERNELVERSION=6.1.12-current \
              ARCH=arm64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: T68M-rockchip64-6.12-image
          path: armbian-build/output/images/
